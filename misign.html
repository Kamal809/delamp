<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}
body{
    padding-left: 10px;
}
.signup-form{
    padding-left: 20px;
}
        /* Form Titles */
.form-title{
    text-align:left;
    margin-bottom:30px;
    padding-left: 150px;
}

.form-title h2{
    color:#001f3f;
    font-size:30px;
    margin-top: 30px;
}

/* Input */
.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:40%;
    padding:14px;
    border:none;
    outline:none;
    background:#f1f1f1;
    border-radius:10px;
    font-size:15px;
}

.input-box input:focus{
    border:2px solid #005792;
}
.male{
    font-family: 'poppins', sans-serif;
    color: rgb(35, 36, 36);
    padding-left: 15px;
    cursor: pointer;
}
.male input{
    margin-top: 15px;
}
/* Button */
button{
    width:40%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#1f9b44;
    color:#fff;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:darkgreen;
    transform:scale(1.02);
}

/* Switch Text */
.switch{
    text-align:left;
    padding-left: 150px;
    margin-top:20px;
    font-size:14px;
}

.switch a{
    color:#138134;
    font-weight:600;
    text-decoration:none;
}
    </style>
</head>
<body>
    <!-- Signup Form -->
        <div class="signup-form">

            <div class="form-title">
                <h2>Sign Up</h2>
            </div>

            <form action="minsignup.html">
                <div class="input-box">
                    <input type="text" placeholder="Full Name" required>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Email Address" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Create Password" required>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Confirm Password" required>
                </div>
                <div class="male">
                <label>Gender:</label> <br>
                <input type="radio" name="Gender" id="Gender">Male <br>
                <input type="radio" name="Gender" id="Gender">Female <br><br>
                </div>
                <a href="index.html">
                <button type="submit">Create Account</button>
                </a>

                <div class="switch">
                    Already have an account?
                        <a href="minsignup.html">Login</a>
                </div>
            </form>

        </div>
</body>
</html>
